<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Task Flow</title>

  <link rel="icon" type="image/png" href="./assets/icons/logo.png">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>
</head>

<body>

  <h1 class="main-title">
    Task Flow
  </h1>

  <main class="container">
    <form id="todoForm" class="todo-form">
      <input type="text" id="taskInput" placeholder="Enter a task..." autocomplete="off" aria-label="Todo task input" />
      <button type="submit">
        Add Task
      </button>
    </form>
    <p id="emptyMessage" class="empty-message">
      No tasks added yet.
    </p>
    <ul id="list" class="todo-list"></ul>
  </main>


  <div id="deleteModal" class="modal hidden">
    <div class="modal-content">
      <h3>Delete Task</h3>
      <p>Are you sure you want to delete this task?</p>
      <div class="modal-actions">
        <button id="cancelDelete" class="cancel-btn">
          Cancel
        </button>
        <button id="confirmDelete" class="confirm-btn">
          Delete
        </button>
      </div>
    </div>
  </div>


  <footer class="footer">
    Designed & Developed by
    <span>Anurag Kumar</span>
  </footer>

  <script src="script.js"></script>

</body>

</html>
